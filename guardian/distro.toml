[distro]
name = "guardian"

# Guardian ships its own provider drivers, gateway, and execute_code skill
# in-tree (they're tailored to the sandbox runtime). It only needs the shared
# _drivers/ support code (providers, provider_selection, etc.) from the
# drivers bundle — none of that bundle's actual skills.
#
# An empty `skills = []` allowlist pulls just the support dirs (anything
# starting with `_`) without installing any skills.

[[bundles]]
name   = "drivers"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=drivers"
skills = []
