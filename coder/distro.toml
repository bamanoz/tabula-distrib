[distro]
name    = "coder"
version = "0.1.0"

[requires]
kernel = ">=0.8.0,<1.0.0"

# The coder distro's signature skill lives in-tree under ``skills/``
# (currently just ``gateway-tui`` — TypeScript/Ink). Everything else comes
# from external bundles shared with familiar.

[[bundles]]
name   = "base"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=base"

[[bundles]]
name   = "files"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=files"

[[bundles]]
name   = "drivers"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=drivers"
skills = ["driver", "subagent"]

[[bundles]]
name   = "memory"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=memory"

[[bundles]]
name   = "coder-workspace"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=coder-workspace"

[[bundles]]
name   = "coder-git"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=coder-git"

[[bundles]]
name   = "coder-tasks"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=coder-tasks"

[[bundles]]
name   = "coder-subagents"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=coder-subagents"

[[bundles]]
name   = "coder-review"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=coder-review"
