[distro]
name    = "claw"
version = "0.1.0"

[requires]
kernel = ">=0.8.0,<1.0.0"

# The claw distro keeps its own daemon gateway wrappers in ``plugins/``;
# per-call tools come from external bundles so other distros can pick and mix.

[sources.tabula-bundles]
source = "git+https://github.com/bamanoz/tabula-bundles.git@main"

[[bundles]]
name   = "base"
source = "source:tabula-bundles#path=base"

[[bundles]]
name   = "files"
source = "source:tabula-bundles#path=files"

[[bundles]]
name   = "drivers"
source = "source:tabula-bundles#path=drivers"

[[bundles]]
name   = "memory"
source = "source:tabula-bundles#path=memory"

[[bundles]]
name   = "subagents"
source = "source:tabula-bundles#path=subagents"
