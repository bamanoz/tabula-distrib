[distro]
name    = "familiar"
version = "0.1.0"

[requires]
kernel = ">=0.8.0,<1.0.0"

# The familiar distro's in-tree ``skills/`` contains only its own signature
# skills: gateway-cli / gateway-api / gateway-telegram / mcp. Everything else
# comes from external bundles so other distros can pick and mix.

[[bundles]]
name   = "base"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=base"

[[bundles]]
name   = "files"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=files"

[[bundles]]
name   = "drivers"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=drivers"

[[bundles]]
name   = "memory"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=memory"
