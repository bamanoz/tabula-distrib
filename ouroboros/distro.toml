[distro]
name = "ouroboros"

# Ouroboros keeps all of its signature skills (identity, scratchpad, tasks,
# consciousness, hooks, git, tabula-guide-style commands …) in-tree. External
# bundles provide generic capabilities: files for filesystem access, drivers
# for LLM provider + subagent runtime, memory for persistent mempalace memory.

[[bundles]]
name   = "files"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=files"

[[bundles]]
name   = "drivers"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=drivers"
skills = ["subagent-openai", "subagent-anthropic"]

[[bundles]]
name   = "memory"
source = "git+https://github.com/bamanoz/tabula-bundles.git@main#path=memory"
